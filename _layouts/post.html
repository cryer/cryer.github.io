---
layout: default
---

<article class="post-container post-container--single" itemscope itemtype="http://schema.org/BlogPosting">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <img src="/images/calendar.png" width="20px"/> 
      <time datetime="{{page.date | date: date_to_xmlschema}}" itemprop="datePublished" class="post-meta__date date">{{page.date | date: "%F"}}</time>  
      <!-- 注释掉每篇文章阅读次数 --> 
      <!--
      <span id="busuanzi_container_page_pv"> | 阅读：<span id="busuanzi_value_page_pv"></span>次</span>
      --> 
    </p>
    </div>
  </header>

  <section class="post">
    {{ content }}

  </section>
</article>

{% include new-old.html %}
{% include comments.html %}

<!-- ✅ 添加 Mermaid 支持 -->
{% if page.mermaid %}
<script src="/assets/js/mermaid.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    // ✅ 先把所有 <code class="language-mermaid"> 替换成 <div class="mermaid">
    document.querySelectorAll('pre code.language-mermaid').forEach(function(block) {
      // 创建新 div.mermaid
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = block.textContent;

      // 替换掉原来的 <pre><code>...</code></pre>
      block.parentNode.parentNode.replaceWith(div);
    });

    // ✅ 再初始化 Mermaid
    if (typeof mermaid !== 'undefined') {
      mermaid.initialize({
        startOnLoad: true,
        theme: 'default',
        securityLevel: 'loose'
      });
    }
  });
</script>
{% endif %}
